name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref (e.g. new pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check & Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # setup-vp installs the Vite+ CLI, Node, and the package manager, and
      # caches dependency installs. See https://viteplus.dev/guide/ci
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install
      - run: vp check
      # Storybook stories run as browser tests (Vitest + Playwright), so CI needs
      # the Chromium binary + its system deps.
      - run: pnpm --filter @plane/propel exec playwright install --with-deps chromium
      - run: vp run -r test
      - run: vp run -r build
