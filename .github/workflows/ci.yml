name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  check:
    name: Check & Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # pnpm (version pinned by package.json's `packageManager`) + Node, with the
      # pnpm content store cached by setup-node.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Turborepo local cache: build/typecheck/test outputs are content-hashed and
      # restored across runs (keyed by commit, falling back to the latest prior run).
      - name: Restore Turbo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - run: pnpm run lint
      - run: pnpm run format:check
      # `^build` builds @makeplane/propel's dist before propel-docs' typecheck/build.
      - run: pnpm exec turbo run build typecheck
      # Storybook stories run as browser tests (Vitest + Playwright), so CI needs the
      # Chromium binary + its system deps. Run tests in a separate step (after build) so
      # the headless browser doesn't contend with the CPU-heavy library builds.
      - run: pnpm --filter @makeplane/propel exec playwright install --with-deps chromium
      - run: pnpm exec turbo run test
