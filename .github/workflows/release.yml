name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the "Version Packages" PR, tags and releases
      pull-requests: write # open/update the release PR
      id-token: write # npm provenance (publishConfig.provenance)
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          cache: true

      # Opens/updates a "Version Packages" PR when changesets are present, and
      # publishes to npm when that PR is merged (i.e. when no changesets remain).
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          # `pnpm` isn't on PATH under setup-vp; drive the scripts through `vp run`.
          version: vp run version-packages
          publish: vp run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
