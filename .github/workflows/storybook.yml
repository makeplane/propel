name: Storybook

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One deploy per ref; a newer push supersedes an in-flight one.
concurrency:
  group: storybook-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy Storybook
    runs-on: ubuntu-latest
    # Fork PRs can't read the Cloudflare secrets, so skip them instead of failing.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write # post the preview URL back on the PR
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install
      - run: vp run -r build-storybook

      # main → production deploy; PR → a versioned upload aliased to the PR number,
      # which yields a stable preview URL (pr-<n>-propel-storybook.<subdomain>.workers.dev)
      # without touching production. https://developers.cloudflare.com/workers/configuration/previews/
      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/propel
          # The action defaults to an old wrangler that lacks `--preview-alias`;
          # pin to v4 (preview aliases + static-assets support).
          wranglerVersion: "4.98.0"
          command: >-
            ${{ github.event_name == 'push'
              && 'deploy'
              || format('versions upload --preview-alias pr-{0}', github.event.pull_request.number) }}

      - name: Comment preview URL on the PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          OUTPUT: ${{ steps.deploy.outputs.command-output }}
          FALLBACK: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          # Prefer the stable `pr-<n>` alias URL (constant across pushes) over the
          # per-version URL that wrangler-action surfaces as deployment-url.
          url=$(printf '%s' "$OUTPUT" | sed -E 's/\x1b\[[0-9;]*m//g' \
            | grep -oE 'https://pr-[0-9]+-[a-z0-9.-]+\.workers\.dev' | head -1)
          url=${url:-$FALLBACK}
          [ -n "$url" ] && gh pr comment "$PR" --edit-last --create-if-none \
            --body "📚 **Storybook preview:** $url"
