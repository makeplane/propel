packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^5
  # Upstream Vite (was the `@voidzero-dev/vite-plus-core` fork under Vite+, which was vite-8
  # based). ^8 is required by astro@7 (`vite: ^8.0.13`) and satisfied by everything else in
  # the workspace: Vitest 4.x (`^6 || ^7 || ^8`), Storybook 10, and @tailwindcss/vite.
  vite: ^8
  vitest: 4.1.9
  "@vitest/browser-playwright": 4.1.9
  "@vitest/coverage-v8": 4.1.9
  "@tailwindcss/vite": ^4.3.2
  "@typescript/native-preview": 7.0.0-dev.20260701.1
  playwright: ^1.61.1
  tailwindcss: ^4.3.2
  "@base-ui/react": ^1.6.0
  lucide-react: ^1.23.0
  # Docs-site typography: self-hosted files for the "Inter Variable" / "IBM Plex Mono"
  # families propel's tokens name, plus the typography plugin that gives `prose` its
  # layout (propel's own `prose` @utility only recolors it).
  "@fontsource-variable/inter": ^5.2.8
  "@fontsource/ibm-plex-mono": ^5.2.7
  "@tailwindcss/typography": ^0.5.20
  # Build/lint/format tools, unbundled from the old Vite+ toolchain and run standalone.
  # oxfmt is pre-1.0 and its output can shift between minors, so pin it EXACTLY — a range
  # would silently reformat the whole tree on a floating upgrade.
  oxlint: 1.72.0
  "@oxlint/plugins": 1.72.0
  oxlint-tsgolint: ^0.24.0
  oxfmt: 0.57.0
  tsdown: ^0.22.9
  publint: ^0.3.21
  "@arethetypeswrong/core": ^0.18.5

overrides:
  # Keep a single Vite instance across storybook + vitest + the tailwind plugin (duplicate
  # vite copies break vite plugins).
  vite: "catalog:"
  vitest: "catalog:"
  # @valibot/to-json-schema@1.7.1 (via @storybook/addon-mcp's tmcp deps) needs valibot ^1.4.0,
  # but the tree otherwise resolves 1.2.0. Force the higher line to satisfy that peer.
  valibot: ^1.4.0
  # Transitive Dependabot security pins, scoped to the specific chains that pull the
  # vulnerable versions so the override can't silently apply to a future or runtime
  # dependency path. Regenerate the lockfile after editing, and keep these in sync with
  # the chains reported by the lockfile (search the snapshots for the package).
  "miniflare>ws": 8.21.0
  "storybook>ws": 8.21.0
  "@vitest/browser>ws": 8.21.0
  # @manypkg/get-packages still asks for read-yaml-file@1, which cannot run with
  # js-yaml@4 because it calls the removed safeLoad API. v2 keeps the same CommonJS
  # surface while supporting js-yaml@4.
  read-yaml-file: 2.1.0
  "@changesets/parse>js-yaml": 4.2.0
  "read-yaml-file>js-yaml": 4.2.0
  "storybook>esbuild": 0.28.1
  "@storybook/csf-plugin>esbuild": 0.28.1
  "vite>esbuild": 0.28.1
  "wrangler>esbuild": 0.28.1

peerDependencyRules:
  # storybook@10.4.6 declares an optional `vite-plus` peer (used only for the optional
  # `vite-plus/versions` subpath). Vite+ is no longer installed, so silence the missing-peer
  # warning — storybook runs on plain vite.
  ignoreMissing:
    - vite-plus
  # Storybook's addon-vitest peer range may lag the exact vitest we pin.
  allowedVersions:
    vitest: "*"

allowBuilds:
  esbuild: true
  sharp: true
  # Its git-hook install runs via the root `prepare` script, so its own postinstall isn't needed.
  simple-git-hooks: false
  workerd: true

minimumReleaseAgeExclude:
  - tsdown@0.22.9
