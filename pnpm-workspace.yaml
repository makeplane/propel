packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^5
  # Pin the Vite+ toolchain to an exact version (was `@latest`). `@latest` re-resolved to a
  # different `@voidzero-dev/vite-plus-core` on every install, so the bundled `oxfmt` drifted
  # between local and CI and formatted the same file differently — keep it deterministic.
  vite: npm:@voidzero-dev/vite-plus-core@0.2.2
  vitest: 4.1.9
  vite-plus: 0.2.2
  "@vitest/browser-playwright": 4.1.9
  "@vitest/coverage-v8": 4.1.9
  "@tailwindcss/vite": ^4.3.2
  "@typescript/native-preview": 7.0.0-dev.20260701.1
  playwright: ^1.61.1
  tailwindcss: ^4.3.2
  "@base-ui/react": ^1.6.0
  lucide-react: ^1.23.0
  oxlint: 1.72.0
  "@oxlint/plugins": 1.72.0

overrides:
  vite: "catalog:"
  vitest: "catalog:"
  # @valibot/to-json-schema@1.7.1 (via @storybook/addon-mcp's tmcp deps) needs valibot ^1.4.0,
  # but the tree otherwise resolves 1.2.0. Force the higher line to satisfy that peer.
  valibot: ^1.4.0
  # Transitive Dependabot security pins, scoped to the specific chains that pull the
  # vulnerable versions so the override can't silently apply to a future or runtime
  # dependency path. Regenerate the lockfile after editing, and keep these in sync with
  # the chains reported by the lockfile (search the snapshots for the package).
  "miniflare>ws": 8.21.0
  "storybook>ws": 8.21.0
  "@vitest/browser>ws": 8.21.0
  # @manypkg/get-packages still asks for read-yaml-file@1, which cannot run with
  # js-yaml@4 because it calls the removed safeLoad API. v2 keeps the same CommonJS
  # surface while supporting js-yaml@4.
  read-yaml-file: 2.1.0
  "@changesets/parse>js-yaml": 4.2.0
  "read-yaml-file>js-yaml": 4.2.0
  "storybook>esbuild": 0.28.1
  "@storybook/csf-plugin>esbuild": 0.28.1
  "vite>esbuild": 0.28.1
  "@voidzero-dev/vite-plus-core>esbuild": 0.28.1
  "wrangler>esbuild": 0.28.1

peerDependencyRules:
  # storybook@10.4.6 still declares its vite-plus peer as ^0.1.15, but its only use of vite-plus
  # (the optional `vite-plus/versions` subpath) is API-compatible with the 0.2.x we run. Accept it
  # the same way as the vite/vitest forks. (Removable once storybookjs/storybook#35221 ships and
  # the published peer range widens to `^0.1.15 || ^0.2.0`.)
  allowAny:
    - vite
    - vite-plus
    - vitest
  allowedVersions:
    vite: "*"
    vite-plus: "*"
    vitest: "*"

allowBuilds:
  esbuild: true
  sharp: true
  workerd: true
